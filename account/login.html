<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Connexion - FlowPage</title>
  <link rel="stylesheet" href="../styles/style.css">
</head>

<body class="auth-page">

  <div class="box">
    <h1>Connexion</h1>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Mot de passe">

    <p id="error"></p>

    <button class="submit" onclick="login()">Se connecter</button>
    <button class="cancel" onclick="window.location.href='../index.html'">Annuler</button>
  </div>

  <script type="module">
    import { auth } from "../js/firebase.js";
    import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    async function login() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const errorBox = document.getElementById("error");

      errorBox.textContent = "";

      if (!email || !password) {
        errorBox.textContent = "⚠️ Remplis tous les champs.";
        return;
      }

      try {
        await signInWithEmailAndPassword(auth, email, password);

        // ✅ CORRECTION ARBORESCENCE
        window.location.href = "../dashboard/config.html";

      } catch (err) {
        console.error(err);

        switch (err.code) {
          case "auth/user-not-found":
            errorBox.textContent = "⚠️ Aucun compte trouvé.";
            break;

          case "auth/wrong-password":
            errorBox.textContent = "⚠️ Mot de passe incorrect.";
            break;

          case "auth/invalid-email":
            errorBox.textContent = "⚠️ Email invalide.";
            break;

          default:
            errorBox.textContent = "⚠️ Erreur de connexion.";
        }
      }
    }

    window.login = login;
  </script>

</body>
</html>
