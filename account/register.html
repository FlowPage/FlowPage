<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Créer un compte - FlowPage</title>
  <link rel="stylesheet" href="../style.css">
</head>

<body class="auth-page">

  <div class="box">
    <h1>Créer un compte</h1>

    <input id="username" placeholder="Pseudo">
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Mot de passe">

    <p id="error"></p>

    <button class="submit" onclick="register()">Créer</button>
    <button class="cancel" onclick="window.location.href='../index.html'">Annuler</button>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBqBMIeFOkjlrTQWVbAK3QwgbbFa0KBHFE",
      authDomain: "flowpage-a1f0e.firebaseapp.com",
      projectId: "flowpage-a1f0e",
      appId: "1:549936871728:web:03d28b432006004d9330f5"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    async function register() {
      const username = document.getElementById("username").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const errorBox = document.getElementById("error");

      errorBox.textContent = "";

      if (!username || !email || !password) {
        errorBox.textContent = "⚠️ Remplis tous les champs.";
        return;
      }

      try {
        // 🔍 vérifier pseudo unique (SAFE)
        const ref = doc(db, "usernames", username.toLowerCase());
        const snap = await getDoc(ref);

        if (snap.exists()) {
          errorBox.textContent = "⚠️ Ce pseudo est déjà pris.";
          return;
        }

        // 👤 créer user
        const userCred = await createUserWithEmailAndPassword(auth, email, password);

        // 💾 stocker username → uid
        await setDoc(doc(db, "usernames", username.toLowerCase()), {
          uid: userCred.user.uid
        });

        // 💾 stocker profil user
        await setDoc(doc(db, "users", userCred.user.uid), {
          username: username,
          email: email
        });

        window.location.href = "../config.html";

      } catch (err) {
        console.error(err);

        if (err.code === "auth/email-already-in-use") {
          errorBox.textContent = "⚠️ Cet email est déjà utilisé.";
        } else if (err.code === "auth/weak-password") {
          errorBox.textContent = "⚠️ Mot de passe trop faible.";
        } else {
          errorBox.textContent = "⚠️ Erreur création compte.";
        }
      }
    }

    window.register = register;
  </script>

</body>
</html>
