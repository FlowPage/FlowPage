<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Créer un compte - FlowPage</title>
  <link rel="stylesheet" href="../styles/style.css">
</head>

<body class="auth-page">

  <div class="box">
    <h1>Créer un compte</h1>

    <input id="username" placeholder="Pseudo">
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Mot de passe">

    <p id="error"></p>

    <button class="submit" onclick="register()">Créer</button>
    <button class="cancel" onclick="window.location.href='../index'">Annuler</button>
  </div>

  <script type="module">
    import { auth, db } from "../js/firebase.js";
    import { createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    async function register() {
      const usernameInput = document.getElementById("username").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const errorBox = document.getElementById("error");

      errorBox.textContent = "";

      if (!usernameInput || !email || !password) {
        errorBox.textContent = "⚠️ Remplis tous les champs.";
        return;
      }

      const username = usernameInput.toLowerCase().replace(/\s+/g, "");

      try {
        // 🔍 check username
        const usernameRef = doc(db, "usernames", username);
        const usernameSnap = await getDoc(usernameRef);

        if (usernameSnap.exists()) {
          errorBox.textContent = "⚠️ Ce pseudo est déjà pris.";
          return;
        }

        // 👤 create auth
        const cred = await createUserWithEmailAndPassword(auth, email, password);

        // 💾 usernames index
        await setDoc(usernameRef, {
          uid: cred.user.uid
        });

        // 💾 user full profile (IMPORTANT POUR DASHBOARD)
        await setDoc(doc(db, "users", cred.user.uid), {
          username,
          email,
          title: "",
          avatar: "",
          links: [],
          published: false
        });

        // 🚀 redirect (cohérent login)
        window.location.href = "../dashboard";

      } catch (err) {
        console.error(err);

        if (err.code === "auth/email-already-in-use") {
          errorBox.textContent = "⚠️ Email déjà utilisé.";
        } else if (err.code === "auth/weak-password") {
          errorBox.textContent = "⚠️ Mot de passe trop faible.";
        } else {
          errorBox.textContent = "⚠️ Erreur création compte.";
        }
      }
    }

    window.register = register;
  </script>

</body>
</html>
