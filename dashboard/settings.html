<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Paramètres - FlowPage</title>

<link rel="stylesheet" href="../styles/web.css">


<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

</head>


<body>


<header class="floating-header">


<div class="logo">
FlowPage
</div>


<nav class="navbar">


<a href="index.html">
Dashboard
</a>


<a href="#" id="logout">
Déconnexion
</a>


</nav>


</header>





<main class="dashboard-page">



<section class="dashboard-header">


<h1>
⚙️ Paramètres
</h1>


<p>
Gérez votre compte FlowPage.
</p>


</section>







<section class="settings-container">







<div class="settings-card">


<h2>
📧 Adresse e-mail
</h2>



<label>
Adresse actuelle
</label>


<p id="current-email">
Chargement...
</p>




<label>
Nouvelle adresse e-mail
</label>


<input 
id="new-email"
type="email"
placeholder="Nouvelle adresse e-mail"
>




<button id="change-email">

Modifier mon e-mail

</button>


<p id="email-message"></p>


</div>









<div class="settings-card">


<h2>
🔒 Modifier le mot de passe
</h2>




<label>
Ancien mot de passe
</label>


<div class="password-field">


<input
id="old-password"
type="password"
placeholder="Ancien mot de passe"
>


<button 
type="button"
class="toggle-password"
data-target="old-password">


<svg viewBox="0 0 24 24">

<path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12Z"/>

<circle cx="12" cy="12" r="3"/>

</svg>


</button>


</div>






<label>
Nouveau mot de passe
</label>


<div class="password-field">


<input
id="new-password"
type="password"
placeholder="Nouveau mot de passe"
>


<button 
type="button"
class="toggle-password"
data-target="new-password">


<svg viewBox="0 0 24 24">

<path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12Z"/>

<circle cx="12" cy="12" r="3"/>

</svg>


</button>


</div>






<label>
Confirmation
</label>


<div class="password-field">


<input
id="confirm-password"
type="password"
placeholder="Confirmer le mot de passe"
>


<button 
type="button"
class="toggle-password"
data-target="confirm-password">


<svg viewBox="0 0 24 24">

<path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12Z"/>

<circle cx="12" cy="12" r="3"/>

</svg>


</button>


</div>






<button id="change-password">

Modifier mon mot de passe

</button>


<p id="password-message"></p>


</div>









<div class="settings-card danger">


<h2>
🗑️ Supprimer mon compte
</h2>


<p>
Cette action est définitive.
</p>



<label>
Mot de passe actuel
</label>



<div class="password-field">


<input
id="delete-password"
type="password"
placeholder="Votre mot de passe"
>


<button 
type="button"
class="toggle-password"
data-target="delete-password">


<svg viewBox="0 0 24 24">

<path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12Z"/>

<circle cx="12" cy="12" r="3"/>

</svg>


</button>


</div>




<button 
id="delete-account"
type="button">

Supprimer mon compte

</button>


<p id="delete-message"></p>


</div>






</section>


</main>






<script type="module" src="../scripts/settings.js"></script>


</body>

</html>
