<div class="logo">
FlowPage
</div>



<nav class="navbar">


<a href="index.html">
Dashboard
</a>

Déconnexion
</a>


</nav>


</header>







<main class="dashboard-page">



<section class="dashboard-header">


<h1>
📊 Statistiques

Analysez les performances de votre FlowPage.
</p>


</section>







<section class="stats-container">





<div class="stats-card">


<h2>
👀 Visites

0

<div class="stats-card">


<h2>

</h2>


<p id="clicks">
0
</p>

</span>


</div>







<div class="stats-card">


<h2>
📅 Création
</h2>


<p id="created">
-
</p>


<span>

</span>

</main>
