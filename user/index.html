<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Profil utilisateur</title>

  <style>
    :root {
      --primary: #70F7DF;
      --secondary: #38BBAF;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--primary);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      background: white;
      width: 420px;
      padding: 25px;
      border-radius: 20px;
      text-align: center;
    }

    img {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      object-fit: cover;
    }

    h1 {
      margin: 10px 0;
      font-size: 22px;
    }

    .link {
      display: block;
      margin: 10px 0;
      padding: 12px;
      background: #f4f4f4;
      border-radius: 10px;
      text-decoration: none;
      color: black;
      font-weight: bold;
    }

    .error {
      color: red;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div class="card" id="card">
    <p>Chargement...</p>
  </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  doc,
  getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBqBMIeFOkjlrTQWVbAK3QwgbbFa0KBHFE",
  authDomain: "flowpage-a1f0e.firebaseapp.com",
  projectId: "flowpage-a1f0e",
  appId: "1:549936871728:web:03d28b432006004d9330f5"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ⚡ URL SIMPLE : /user/?pseudo=dvd_hss
const params = new URLSearchParams(window.location.search);
const username = params.get("pseudo");

const card = document.getElementById("card");

async function loadUser() {
  if (!username) {
    card.innerHTML = `<p class="error">Pseudo manquant</p>`;
    return;
  }

  // ⚡ ON UTILISE LE DOCUMENT username (BEAUCOUP PLUS RAPIDE)
  const ref = doc(db, "usernames", username);
  const snap = await getDoc(ref);

  if (!snap.exists()) {
    card.innerHTML = `<p class="error">Utilisateur introuvable</p>`;
    return;
  }

  const uid = snap.data().uid;

  const userRef = doc(db, "users", uid);
  const userSnap = await getDoc(userRef);

  if (!userSnap.exists()) {
    card.innerHTML = `<p class="error">Profil introuvable</p>`;
    return;
  }

  const data = userSnap.data();

  if (!data.published) {
    card.innerHTML = `<p class="error">Ce profil n'est pas public</p>`;
    return;
  }

  card.innerHTML = `
    ${data.avatar ? `<img src="${data.avatar}">` : ""}
    <h1>@${data.username}</h1>
    <p>${data.title || ""}</p>
    <div id="links"></div>
  `;

  const linksDiv = document.getElementById("links");

  (data.links || []).forEach(link => {
    const a = document.createElement("a");
    a.className = "link";
    a.href = link.url;
    a.target = "_blank";
    a.textContent = link.title;
    linksDiv.appendChild(a);
  });
}

loadUser();
</script>

</body>
</html>
