<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profil utilisateur</title>

  <style>
    :root {
      --primary: #70F7DF;
      --secondary: #38BBAF;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--primary);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      position: relative;
    }

    /* ================= SHARE BUTTON ================= */
    .share-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      background: white;
      border: none;
      padding: 10px 14px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: bold;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    /* ================= MAIN CARD ================= */
    .card {
      background: white;
      width: 420px;
      max-width: 100%;
      padding: 25px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    img {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 10px;
    }

    h1 {
      margin: 10px 0 5px;
      font-size: 22px;
    }

    p {
      margin: 5px 0 15px;
      opacity: 0.8;
    }

    .link {
      display: block;
      margin: 10px 0;
      padding: 14px;
      background: #f4f4f4;
      border-radius: 12px;
      text-decoration: none;
      color: black;
      font-weight: bold;
      transition: 0.2s;
    }

    .link:hover {
      background: #e9e9e9;
      transform: scale(1.02);
    }

    .error {
      color: red;
      font-weight: bold;
    }

    /* ================= CTA BUTTON ================= */
    .cta {
      margin-top: 20px;
      display: inline-block;
      background: var(--secondary);
      color: white;
      padding: 14px 20px;
      border-radius: 14px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.2s;
    }

    .cta:hover {
      transform: scale(1.05);
      background: #2ea69b;
    }

    @media (max-width: 768px) {
      .card {
        padding: 20px;
        border-radius: 16px;
      }

      h1 {
        font-size: 20px;
      }

      .link {
        padding: 16px;
        font-size: 16px;
      }
    }
  </style>
</head>

<body>

  <!-- 🔥 SHARE BUTTON -->
  <button class="share-btn" onclick="sharePage()">Partager</button>

  <div class="card" id="card">
    <p>Chargement...</p>
  </div>

<script type="module">
import { db } from "../js/firebase.js";
import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const pathParts = window.location.pathname.split("/").filter(Boolean);
const username = pathParts[pathParts.length - 1];

const card = document.getElementById("card");

async function loadUser() {
  if (!username) {
    card.innerHTML = `<p class="error">Pseudo manquant</p>`;
    return;
  }

  const ref = doc(db, "usernames", username.toLowerCase());
  const snap = await getDoc(ref);

  if (!snap.exists()) {
    card.innerHTML = `<p class="error">Utilisateur introuvable</p>`;
    return;
  }

  const uid = snap.data().uid;

  const userRef = doc(db, "users", uid);
  const userSnap = await getDoc(userRef);

  if (!userSnap.exists()) {
    card.innerHTML = `<p class="error">Profil introuvable</p>`;
    return;
  }

  const data = userSnap.data();

  if (!data.published) {
    card.innerHTML = `<p class="error">Ce profil n'est pas public</p>`;
    return;
  }

  card.innerHTML = `
    ${data.avatar ? `<img src="${data.avatar}">` : ""}
    <h1>@${data.username}</h1>
    <p>${data.title || ""}</p>
    <div id="links"></div>

    <!-- 🔥 CTA BUTTON -->
    <a href="/account/register" class="cta">Rejoignez l'aventure !</a>
  `;

  const linksDiv = document.getElementById("links");

  (data.links || []).forEach(link => {
    const a = document.createElement("a");
    a.className = "link";
    a.href = link.url;
    a.target = "_blank";
    a.textContent = link.title;
    linksDiv.appendChild(a);
  });
}

loadUser();

/* ================= SHARE FUNCTION ================= */
window.sharePage = function () {
  const url = window.location.href;

  if (navigator.share) {
    navigator.share({
      title: "FlowPage",
      url: url
    });
  } else {
    navigator.clipboard.writeText(url);
    alert("Lien copié !");
  }
};
</script>

</body>
</html>
